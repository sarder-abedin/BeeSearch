# Streamlit theme configuration
# ───────────────────────────────
# Pins a light theme so the app always renders with a light background and
# dark text, regardless of the visitor's OS/browser dark-mode preference
# (Streamlit otherwise auto-detects and falls back to its near-black dark
# theme). Colors match the palette already used in ui/theme.py.

[server]
# Open the browser automatically when running locally (streamlit run app.py).
# Docker overrides this with ENV STREAMLIT_SERVER_HEADLESS=true; scripts/
# start*.sh poll the health endpoint and open the browser from the host side.
headless = false

[theme]
base = "light"
primaryColor = "#B45309"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#0F172A"
font = "sans serif"
